openapi: 3.0.0
info:
  title: Wallet Service API
  version: 1.0.0
servers:
  - url: http://localhost:3000

tags:
  - name: Meta
    description: Health and basic info
  - name: Wallets
    description: Wallet operations (create, list, deposit, withdraw, delete, restore, ledger)
  - name: Transfers
    description: Transfers operations

paths:
  /:
    get:
      tags: [Meta]
      summary: API home
      responses:
        "200":
          description: OK

  /health:
    get:
      tags: [Meta]
      summary: Health check
      responses:
        "200":
          description: OK

  # -----------------------
  # Wallets
  # -----------------------
  /wallets:
    get:
      tags: [Wallets]
      summary: List wallets
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: OK

    post:
      tags: [Wallets]
      summary: Create wallet
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                currency:
                  type: string
                  example: EGP
      responses:
        "201":
          description: Created

  /wallets/{id}:
    get:
      tags: [Wallets]
      summary: Get wallet by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: Wallet not found

    delete:
      tags: [Wallets]
      summary: Soft delete wallet (status = deleted)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
        "404":
          description: Wallet not found

  /wallets/{id}/restore:
    patch:
      tags: [Wallets]
      summary: Restore soft-deleted wallet (status = active)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Restored
        "404":
          description: Wallet not found or not deleted

  /wallets/{id}/deposit:
    post:
      tags: [Wallets]
      summary: Deposit into wallet
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_cents]
              properties:
                amount_cents:
                  type: integer
                  example: 10000
      responses:
        "200":
          description: OK
        "400":
          description: Validation error
        "404":
          description: Wallet not found

  /wallets/{id}/withdraw:
    post:
      tags: [Wallets]
      summary: Withdraw from wallet
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_cents]
              properties:
                amount_cents:
                  type: integer
                  example: 2500
      responses:
        "200":
          description: OK
        "400":
          description: Insufficient funds / validation error
        "404":
          description: Wallet not found

  /wallets/{id}/ledger:
    get:
      tags: [Wallets]
      summary: Get wallet ledger (history)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: OK
        "404":
          description: Wallet not found

  # -----------------------
  # Transfers
  # -----------------------
  /transfers:
    get:
      tags: [Transfers]
      summary: List transfers
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: OK

    post:
      tags: [Transfers]
      summary: Create transfer
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
            example: 11111111-1111-1111-1111-111111111111
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_wallet_id, to_wallet_id, amount_cents]
              properties:
                from_wallet_id:
                  type: string
                to_wallet_id:
                  type: string
                amount_cents:
                  type: integer
                  example: 1000
      responses:
        "201":
          description: Created
        "400":
          description: Validation error
        "409":
          description: Idempotency key reused with different payload
        "404":
          description: Wallet not found

  /transfers/{id}:
    get:
      tags: [Transfers]
      summary: Get transfer by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: Transfer not found
